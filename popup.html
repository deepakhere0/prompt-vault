<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Vault</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <span class="logo">⚡ Prompt Vault</span>
      <button class="btn-primary" id="btn-add">+ New Prompt</button>
    </header>

    <div class="toolbar">
      <input type="search" id="search" placeholder="Search all prompts…" autocomplete="off" />
      <div class="source-chips" id="source-chips">
        <!-- Source filter rendered by popup.js -->
      </div>
      <div class="category-chips" id="category-chips">
        <!-- Category chips rendered by popup.js -->
      </div>
    </div>

    <div class="prompt-list" id="prompt-list">
      <!-- Prompt cards rendered by popup.js -->
    </div>

    <!-- Optimizer settings (collapsible) -->
    <div class="opt-panel" id="opt-panel">
      <button class="opt-hdr" id="opt-hdr" type="button">
        <span class="opt-hdr-label">Optimizer ✨</span>
        <span class="opt-hdr-status" id="opt-hdr-status">Standard · Auto-detect</span>
        <span class="opt-hdr-chevron" id="opt-chevron">›</span>
      </button>
      <div class="opt-body" id="opt-body">
        <div class="opt-row">
          <span class="opt-lbl">Enabled</span>
          <input type="checkbox" id="opt-enabled" class="toggle" checked />
        </div>
        <div class="opt-row">
          <span class="opt-lbl">Level</span>
          <div class="seg-group" id="opt-level-group">
            <button class="seg" data-v="light" type="button">Light</button>
            <button class="seg" data-v="standard" type="button">Standard</button>
            <button class="seg" data-v="expert" type="button">Expert</button>
          </div>
        </div>
        <div class="opt-row">
          <span class="opt-lbl">Mode</span>
          <select id="opt-mode" class="opt-sel">
            <option value="auto">Auto-detect</option>
            <option value="coding">Coding</option>
            <option value="business">Startup</option>
            <option value="research">Research</option>
            <option value="writing">Writing</option>
            <option value="student">Student</option>
            <option value="goal">Goal Expansion</option>
          </select>
        </div>
        <div class="opt-row">
          <span class="opt-lbl">Profile</span>
          <div class="opt-flex">
            <select id="opt-profile" class="opt-sel" style="flex:1"></select>
            <button class="btn-icon save-btn" id="btn-save-profile" title="Save current settings as new profile">＋</button>
            <button class="btn-icon danger"   id="btn-del-profile"  title="Delete selected profile">×</button>
          </div>
        </div>
        <div class="opt-row opt-col">
          <span class="opt-lbl">Custom</span>
          <textarea id="opt-custom" class="opt-textarea" rows="2"
            placeholder="e.g. Always use British English, prefer bullet points"></textarea>
        </div>
      </div>
    </div>

    <div class="settings-bar">
      <label class="setting-row" title="Automatically send the chat after optimizing">
        <span>Auto-send after Optimize ✨</span>
        <input type="checkbox" id="opt-autosend" class="toggle" />
      </label>
    </div>

    <div class="footer-bar">
      <button class="btn-ghost" id="btn-import">Import JSON</button>
      <button class="btn-ghost" id="btn-export">Export JSON</button>
    </div>
  </div>

  <!-- Edit / Add modal -->
  <div class="modal-overlay hidden" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <h2 id="modal-title">New Prompt</h2>
      <label>Title <input type="text" id="f-title" placeholder="e.g. SEO Outline" /></label>
      <label>Shortcut <input type="text" id="f-shortcut" placeholder="/keyword" /></label>
      <label>Category <input type="text" id="f-category" placeholder="e.g. Marketing" list="category-list" /></label>
      <datalist id="category-list"></datalist>
      <label>Body
        <textarea id="f-body" rows="6" placeholder="Your prompt text. Use [Variable] for fill-in blanks."></textarea>
      </label>
      <p class="modal-error hidden" id="modal-error"></p>
      <div class="modal-actions">
        <button class="btn-ghost" id="modal-cancel">Cancel</button>
        <button class="btn-primary" id="modal-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Hidden file input for import -->
  <input type="file" id="import-file" accept=".json" style="display:none" />

  <script src="lib/storage.js"></script>
  <script src="lib/optimizer.js"></script>
  <script src="popup.js"></script>
</body>
</html>
